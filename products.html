<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <h1>Products</h1>

      <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
      </nav>
    </header>
    <main>
      <div class="products">
        <div class="product">
          <a href="product.html">
            <img src="images/Glock 18.jpg" alt="Glock 18" />

            <h3>Glock 18</h3>
            <p>$1000</p>
          </a>
          <button onclick="addToCart('Glock 18', 1000)">Add to cart</button>
        </div>
        <div class="product">
          <img src="images/M1911 Pistol.jpg" alt="M1911 Pistol" />
          <h3>M1911 Pistol</h3>
          <p>$700</p>
          <button onclick="addToCart('M1911 Pistol', 700)">Add to cart</button>
        </div>
        <div class="product">
          <img src="images/AK-47.jpg" alt="AK-47" />
          <h3>AK-47</h3>
          <p>$2000</p>
          <button onclick="addToCart('AK-47', 2000)">Add to cart</button>
        </div>
        <div class="product">
          <img src="images/Remington 870.jpg" alt="Remington 870" />
          <h3>Remington 870</h3>
          <p>$1250</p>
          <button onclick="addToCart('Remington 87', 1250)">Add to cart</button>
        </div>
        <div class="product">
          <h3>AR-15</h3>
          <p>$1100</p>
          <button onclick="addToCart('AR-15', 1100)">Add to cart</button>
        </div>
        <div class="product">
          <h3>Colt M1911</h3>
          <p>$850</p>
          <button onclick="addToCart('Colt M1911', 850)">Add to cart</button>
        </div>
        <div class="product">
          <h3>Thompson Submachine Gun</h3>
          <p>$2500</p>
          <button onclick="addToCart('Thompson Submachine Gun', 2500)">
            Add to cart
          </button>
        </div>
        <div class="product">
          <h3>Mauser 98</h3>
          <p>$450</p>
          <button onclick="addToCart('Mauser 98', 450)">Add to cart</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
